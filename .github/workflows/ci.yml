name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Honour rust-toolchain.toml: installs the pinned channel (1.95.0)
      # with declared components and targets.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy (all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Doc
        run: cargo doc --no-deps

      - name: Deny
        uses: EmbarkStudios/cargo-deny-action@v2

  wasm:
    name: WASM build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # rust-toolchain.toml declares targets = ["wasm32-unknown-unknown"];
      # rustup show installs the pinned toolchain plus that target.
      - name: Install Rust toolchain (from rust-toolchain.toml)
        run: rustup show

      - uses: Swatinem/rust-cache@v2

      - name: Build regit-svi for wasm32-unknown-unknown
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Report artefact size
        run: ls -lh target/wasm32-unknown-unknown/release/ | grep -E '\.(rlib|wasm)' || true
